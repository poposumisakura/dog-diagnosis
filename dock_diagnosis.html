<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ドック診断 | 釧路孝仁会記念病院 高度健診センター</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: #f2f2f2;
  min-height: 100vh;
}
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: #fff;
  display: flex;
  flex-direction: column;
}
.hdr {
  background: #1a6b4a;
  color: #fff;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}
.hdr-icon {
  width: 34px; height: 34px;
  background: rgba(255,255,255,0.22);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: bold; flex-shrink: 0;
}
.hdr-title { font-size: 12.5px; font-weight: bold; line-height: 1.35; }
.hdr-sub { font-size: 10.5px; opacity: 0.82; margin-top: 1px; }
.chat {
  flex: 1;
  padding: 14px 12px 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
}
.msg { display: flex; gap: 8px; align-items: flex-end; }
.msg.bot { flex-direction: row; }
.msg.user { flex-direction: row-reverse; }
.av {
  width: 28px; height: 28px;
  background: #1a6b4a;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: bold; flex-shrink: 0;
}
.bub {
  max-width: 83%;
  padding: 10px 13px;
  border-radius: 16px;
  font-size: 13.5px;
  line-height: 1.65;
  color: #1a1a1a;
}
.msg.bot .bub { background: #f0f0f0; border-bottom-left-radius: 4px; }
.msg.user .bub { background: #1a6b4a; color: #fff; border-bottom-right-radius: 4px; }
.typing { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
.dot { width: 7px; height: 7px; background: #aaa; border-radius: 50%; animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
.choices { display: flex; flex-direction: column; gap: 8px; padding: 4px 12px 4px 48px; }
.ch-btn {
  background: #fff;
  border: 1.5px solid #1a6b4a;
  color: #1a6b4a;
  border-radius: 20px;
  padding: 10px 16px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  text-align: left;
  line-height: 1.45;
  transition: background 0.12s;
}
.ch-btn:hover, .ch-btn:active { background: #e8f5ee; }
.ch-btn:disabled { opacity: 0.4; cursor: default; background: #fff; }
.card { background: #fff; border: 2px solid #1a6b4a; border-radius: 12px; overflow: hidden; margin: 2px 0; }
.card-hd { background: #1a6b4a; color: #fff; padding: 10px 14px 12px; }
.card-num { font-size: 11px; opacity: 0.78; margin-bottom: 2px; }
.card-name { font-size: 14.5px; font-weight: bold; line-height: 1.3; }
.card-price { font-size: 21px; font-weight: bold; margin-top: 4px; }
.card-price span { font-size: 12px; font-weight: normal; opacity: 0.85; }
.card-bd { padding: 11px 14px; }
.row { display: flex; gap: 8px; margin-bottom: 7px; align-items: flex-start; }
.lbl { font-size: 11px; color: #888; min-width: 52px; padding-top: 2px; flex-shrink: 0; }
.val { font-size: 12.5px; color: #222; line-height: 1.5; }
.tag { display: inline-block; background: #e6f5ee; color: #0f6e56; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin: 2px 2px 2px 0; }
.warn { display: inline-block; background: #faeeda; color: #854f0b; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin: 2px 2px 2px 0; }
.info { background: #e8f5ee; border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #0f6e56; line-height: 1.55; margin-top: 4px; }
.caution { background: #faeeda; border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #854f0b; line-height: 1.55; margin-top: 4px; }
.outro { background: #fff; border: 2px solid #1a6b4a; border-radius: 12px; padding: 14px 16px; margin-top: 4px; text-align: center; }
.outro-title { font-size: 13px; font-weight: bold; color: #1a6b4a; margin-bottom: 8px; }
.outro-body { font-size: 12.5px; color: #444; line-height: 1.65; }
.outro-tel { font-size: 18px; font-weight: bold; color: #1a6b4a; margin: 6px 0 2px; letter-spacing: 0.04em; }
.outro-note { font-size: 11px; color: #888; }
.restart-wrap { padding: 4px 12px 0; }
.restart-btn { background: none; border: 1px solid #ccc; color: #888; border-radius: 20px; padding: 7px 18px; font-size: 12px; font-family: inherit; cursor: pointer; margin-top: 6px; }
.restart-btn:hover { background: #f5f5f5; }
.multi { display: flex; flex-direction: column; gap: 10px; }
.hr { border: none; border-top: 1px solid #eee; margin: 4px 0; }
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-icon">+</div>
    <div>
      <div class="hdr-title">釧路孝仁会記念病院 高度健診センター</div>
      <div class="hdr-sub">ドック・健診コース診断</div>
    </div>
  </div>
  <div class="chat" id="chat"></div>
</div>
<script>
var C = {
  c01:{ num:'01', name:'三大プレミアムドック（8時間）', price:'249,700', time:'約8時間', mri:true, cta:true,
    summary:'PET-CT・脳ドック・心臓ドック＋脊髄・胃カメラ・肺機能・聴力を1日で。最も充実した内容。',
    tags:['PET-CT','頭部MRI/MRA','冠動脈CTA','胃カメラ','肺機能','腫瘍マーカー','頚椎/腰椎MRI'] },
  c02:{ num:'02', name:'三大クイックドック（8時間）', price:'213,400', time:'約8時間', mri:true, cta:true,
    summary:'PET-CT・脳ドック・心臓ドック＋胃カメラを1日で。三大疾病コースの定番。',
    tags:['PET-CT','頭部MRI/MRA','冠動脈CTA','胃カメラ','腫瘍マーカー','頚動脈エコー'] },
  c03:{ num:'03', name:'三大疾病ドック（2日間）', price:'189,200', time:'2日間', mri:true, cta:true,
    summary:'PET-CT・脳ドック・心臓ドックを2日間でじっくり。24時間心電図も含む。',
    tags:['PET-CT','頭部MRI/MRA','冠動脈CTA','24時間心電図','腫瘍マーカー'] },
  c04:{ num:'04', name:'PET総合がんドック（約5時間）', price:'126,500', time:'約5時間', mri:true, cta:false,
    summary:'PET-CT・MRI・腫瘍マーカーを組み合わせたがん早期発見コース。',
    tags:['PET-CT','胸部CT','頭部/骨盤MRI','甲状腺エコー','腫瘍マーカー','ABC検診'] },
  c05:{ num:'05', name:'PET-CTドック（約3時間）', price:'88,000', time:'約3時間', mri:false, cta:false,
    summary:'PET-CT単独の全身スクリーニング。短時間でがん検査を受けたい方に。',
    tags:['PET-CT','胸部CT'] },
  c06:{ num:'06', name:'肺がんドック（約3時間）', price:'27,500', time:'約3時間', mri:false, cta:false,
    summary:'胸部CT・肺機能・喀痰・腫瘍マーカーで肺がんを早期発見。喫煙者に推奨。',
    tags:['胸部CT','肺機能検査','喀痰検査','腫瘍マーカー'] },
  c07:{ num:'07', name:'肺がん検査（約30分）', price:'9,900', time:'約30分', mri:false, cta:false,
    summary:'問診＋胸部CTのみ。短時間でお手軽に受けられます。',
    tags:['胸部CT','問診'] },
  c08:{ num:'08', name:'脳精密ドック（約3時間）', price:'33,000', time:'約3時間', mri:true, cta:false,
    summary:'頭部MRI/MRA・頚動脈エコー・ABI・眼底で脳血管病変・動脈瘤を精査。',
    tags:['頭部MRI/MRA','頚動脈エコー','ABI検査','眼底検査','心電図'] },
  c09:{ num:'09', name:'脳脊髄精密ドック（約4時間）', price:'55,000', time:'約4時間', mri:true, cta:false,
    summary:'脳精密ドック＋頚椎・腰椎MRIを追加。手足のしびれが気になる方に。',
    tags:['頭部/頚椎/腰椎MRI','頚椎/腰椎X線','頚動脈エコー','ABI検査','眼底検査'] },
  c10:{ num:'10', name:'認知症ドック（約5時間）', price:'93,500', time:'約5時間', mri:true, cta:false,
    summary:'PET-CT＋頭部MRI（VSRAD）で認知症・アルツハイマーを早期発見。',
    tags:['PET-CT','頭部MRI（VSRAD）','頚動脈エコー','認知機能検査','血液検査'] },
  c11:{ num:'11', name:'心臓ドック（2日間）', price:'66,000', time:'2日間', mri:false, cta:true,
    summary:'冠動脈CTA・心臓エコー・24時間心電図で心臓を精密検査。',
    tags:['冠動脈CTA','心臓エコー','24時間心電図','ABI検査','頚動脈エコー'] },
  c12:{ num:'12', name:'血管ドック（約3時間）', price:'28,600', time:'約3時間', mri:false, cta:false,
    summary:'胸部/腹部CT・頚動脈エコー・ABIで動脈硬化・血管疾患を検査。',
    tags:['胸部/腹部CT','頚動脈エコー','ABI検査','眼底検査'] },
  c13g:{ num:'13', name:'人間ドック・胃カメラコース（約4時間）', price:'42,900', time:'約4時間', mri:false, cta:false,
    summary:'生活習慣病・胃がんの早期発見。内視鏡（胃カメラ）で精密検査。',
    tags:['胃カメラ','胸部X線','腹部エコー','眼底検査','肺機能','腫瘍マーカー'] },
  c13b:{ num:'13', name:'人間ドック・胃バリウムコース（約3時間）', price:'38,500', time:'約3時間', mri:false, cta:false,
    summary:'生活習慣病・胃がんの早期発見。バリウム検査コース。',
    tags:['胃バリウム','胸部X線','腹部エコー','眼底検査','肺機能','腫瘍マーカー'] },
  c13a:{ num:'13', name:'人間ドック・ABC検診コース（約2時間）', price:'35,200', time:'約2時間', mri:false, cta:false,
    summary:'生活習慣病スクリーニング。血液検査中心で短時間・低コスト。',
    tags:['ABC検診（血液）','胸部X線','腹部エコー','眼底検査','肺機能','腫瘍マーカー'] }
};

var mriNG = false, ctaNG = false;
var chatEl = document.getElementById('chat');

function scroll() { setTimeout(function(){ chatEl.scrollTop = chatEl.scrollHeight; }, 60); }

function botMsg(html, delay) {
  if (delay === undefined) delay = 380;
  return new Promise(function(ok) {
    var w = document.createElement('div');
    w.className = 'msg bot';
    w.innerHTML = '<div class="av">+</div><div class="bub"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
    chatEl.appendChild(w); scroll();
    setTimeout(function() { w.querySelector('.bub').innerHTML = html; scroll(); ok(); }, delay);
  });
}

function userMsg(text) {
  var w = document.createElement('div');
  w.className = 'msg user';
  w.innerHTML = '<div class="bub">' + text + '</div>';
  chatEl.appendChild(w); scroll();
}

function showChoices(items) {
  var d = document.createElement('div');
  d.className = 'choices';
  items.forEach(function(item) {
    var b = document.createElement('button');
    b.className = 'ch-btn'; b.textContent = item.label;
    b.onclick = function() {
      d.querySelectorAll('.ch-btn').forEach(function(x){ x.disabled = true; });
      item.fn();
    };
    d.appendChild(b);
  });
  chatEl.appendChild(d); scroll();
}

function card(id) {
  var c = C[id];
  var mriW = c.mri ? '<div style="margin-top:8px"><span class="warn">MRIを含む</span><span style="font-size:11px;color:#888;"> 体内金属のある方は事前にご連絡ください</span></div>' : '';
  var ctaW = c.cta ? '<div style="margin-top:4px"><span class="warn">冠動脈CTAを含む</span><span style="font-size:11px;color:#888;"> 造影剤アレルギーのある方は事前にご連絡ください</span></div>' : '';
  var tagsHTML = c.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('');
  return '<div class="card"><div class="card-hd"><div class="card-num">コース ' + c.num + '</div><div class="card-name">' + c.name + '</div><div class="card-price">' + c.price + '円<span>（税込）</span></div></div><div class="card-bd"><div class="row"><span class="lbl">所要時間</span><span class="val">' + c.time + '</span></div><div class="row"><span class="lbl">内容</span><span class="val">' + c.summary + '</span></div><div class="row" style="margin-top:4px"><span class="lbl">主な検査</span><span class="val">' + tagsHTML + '</span></div>' + mriW + ctaW + '</div></div>';
}

var OUTRO = '<div class="outro"><div class="outro-title">ご予約・お問い合わせ</div><div class="outro-body">ご予約はリッチメニューの<br>「Web予約」または「お電話で予約」からどうぞ。<div class="outro-tel">0120-133-527</div><div class="outro-note">受付時間 月〜金 8:30〜12:00 / 13:00〜16:00（土日祝除く）</div></div></div>';

function addRestart() {
  var d = document.createElement('div');
  d.className = 'restart-wrap';
  d.innerHTML = '<hr class="hr"><button class="restart-btn" onclick="start()">最初からやり直す</button>';
  chatEl.appendChild(d); scroll();
}

async function finish(cardHTML) {
  await botMsg(cardHTML, 400);
  await botMsg(OUTRO, 500);
  addRestart();
}

async function start() {
  chatEl.innerHTML = '';
  mriNG = false; ctaNG = false;
  await botMsg('こんにちは！<br>釧路孝仁会記念病院 高度健診センターの<strong>ドック診断</strong>です。<br>いくつかの質問で、あなたに合ったコースをご案内します。', 600);
  await stepMRI();
}

async function stepMRI() {
  await botMsg('まず安全確認のご質問です。<br>以下のいずれかに<strong>当てはまりますか？</strong><br><br>・心臓ペースメーカー<br>・人工弁・脳動脈瘤クリップ<br>・体内に金属（ボルト・人工関節等）<br>・入れ墨');
  showChoices([
    { label: 'はい、当てはまるものがある', fn: async function() {
      userMsg('はい、当てはまるものがある');
      mriNG = true;
      await botMsg('承知しました。<br>MRIを含む検査はご利用いただけない場合があります。<br><span style="font-size:12px;color:#666;">（MRIを含まないコースをご案内します）</span>');
      await stepCTA();
    }},
    { label: 'いいえ、当てはまらない', fn: async function() {
      userMsg('いいえ、当てはまらない');
      await stepCTA();
    }}
  ]);
}

async function stepCTA() {
  await botMsg('次のご確認です。以下はありますか？<br><br>・<strong>造影剤アレルギー</strong><br>・重度の<strong>腎機能低下</strong><br>・<strong>腎臓病・糖尿病・重篤な心臓病</strong>');
  showChoices([
    { label: 'はい、当てはまるものがある', fn: async function() {
      userMsg('はい、当てはまるものがある');
      ctaNG = true;
      await botMsg('承知しました。<br>冠動脈CTAを含むコースは除いてご案内します。<br><span style="font-size:12px;color:#666;">※受診前に必ず担当医師にご相談ください</span>');
      await stepRoute();
    }},
    { label: 'いいえ、当てはまらない', fn: async function() {
      userMsg('いいえ、当てはまらない');
      await stepRoute();
    }}
  ]);
}

async function stepRoute() {
  await botMsg('今回、最も優先して確認したいのはどれですか？');
  showChoices([
    { label: 'A：全身のがん・三大疾病を網羅したい', fn: async function() {
      userMsg('A：全身のがん・三大疾病を網羅したい');
      await routeA();
    }},
    { label: 'B：特定の部位（脳・心臓・肺・物忘れ）が心配', fn: async function() {
      userMsg('B：特定の部位が心配');
      await routeB();
    }},
    { label: 'C：一般的な人間ドック・会社指定の健診', fn: async function() {
      userMsg('C：一般的な人間ドック・会社指定の健診');
      await routeC();
    }},
    { label: 'D：女性向け検診（乳がん・子宮がん）', fn: async function() {
      userMsg('D：女性向け検診（乳がん・子宮がん）');
      await routeD();
    }}
  ]);
}

async function routeA() {
  await botMsg('受診にかけられる時間はどのくらいですか？');
  showChoices([
    { label: '1日（8時間程度）で完結させたい', fn: async function() {
      userMsg('1日で完結させたい');
      if (!mriNG && !ctaNG) {
        await botMsg('1日コースをご提案します。<br>違いは<strong>脊髄・肺機能・聴力検査の追加</strong>の有無です。');
        await botMsg('<div class="multi">' + card('c01') + card('c02') + '</div>', 400);
        await botMsg('<div class="info">PET-CTはがん細胞がブドウ糖を正常細胞の数〜数十倍多く取り込む性質を利用し、1回の検査で全身のがんをスクリーニングできる最先端の画像診断法です。</div>', 400);
      } else if (mriNG) {
        await botMsg('MRIを含まないコースをご案内します。');
        await botMsg(card('c05'), 400);
      } else {
        await botMsg('造影剤の制限によりPET総合がんドックをご案内します。');
        await botMsg(card('c04'), 400);
      }
      await botMsg(OUTRO, 500);
      addRestart();
    }},
    { label: '2日間に分けてもよい', fn: async function() {
      userMsg('2日間に分けてもよい');
      if (!mriNG && !ctaNG) {
        await botMsg('2日間コースです。24時間心電図も含まれます。');
        await finish(card('c03'));
      } else if (mriNG) {
        await botMsg('MRIを含まないコースをご案内します。');
        await finish(card('c05'));
      } else {
        await botMsg('造影剤の制限によりPET総合がんドックをご案内します。');
        await finish(card('c04'));
      }
    }},
    { label: 'がんだけ手軽に確認したい（3〜5時間）', fn: async function() {
      userMsg('がんだけ手軽に確認したい');
      if (!mriNG) {
        await botMsg('MRIの有無でコースが異なります。');
        await botMsg('<div class="multi">' + card('c04') + card('c05') + '</div>', 400);
      } else {
        await botMsg('MRIを含まないPET-CTドックをご案内します。');
        await botMsg(card('c05'), 400);
      }
      await botMsg(OUTRO, 500);
      addRestart();
    }}
  ]);
}

async function routeB() {
  await botMsg('特に気になる部位・症状はどれですか？');
  showChoices([
    { label: '脳・脳卒中・脳血管が心配', fn: async function() {
      userMsg('脳・脳卒中・脳血管が心配');
      if (!mriNG) {
        await botMsg('脳の検査コースです。<br>しびれがある場合は脳脊髄精密ドックをお勧めします。');
        await botMsg('<div class="multi">' + card('c08') + card('c09') + '</div>', 400);
        await botMsg('<div class="info">当センターの3.0T MRIは従来の1.5Tと比べ磁場・信号比が2倍。細かい血管や脳疾患の発見がより容易になっています。</div>', 400);
        await botMsg(OUTRO, 500);
        addRestart();
      } else {
        await botMsg('<div class="caution">脳ドックにはMRIが含まれます。体内金属がある場合はご利用いただけない場合があります。<br>詳しくは健診センターへお問い合わせください。</div>', 400);
        await botMsg(OUTRO, 500);
        addRestart();
      }
    }},
    { label: '心臓・冠動脈・動脈硬化が心配', fn: async function() {
      userMsg('心臓・冠動脈・動脈硬化が心配');
      if (!ctaNG) {
        await botMsg('心臓・血管のコースです。');
        await botMsg('<div class="multi">' + card('c11') + card('c12') + '</div>', 400);
      } else {
