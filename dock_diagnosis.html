<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ドック・健診コース診断 | 釧路孝仁会記念病院</title>
<style>
  /* ===== リセット & ベース ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 14px; background: #f0f0f0; }

  /* ===== レイアウト ===== */
  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
  }

  /* ===== ヘッダー ===== */
  .header {
    background: #1a6b4a;
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-icon {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold; flex-shrink: 0;
  }
  .header-title { font-size: 13px; font-weight: bold; line-height: 1.3; }
  .header-sub { font-size: 11px; opacity: 0.85; margin-top: 1px; }

  /* ===== チャットエリア ===== */
  .chat-area {
    flex: 1;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    padding-bottom: 24px;
  }

  /* ===== メッセージ ===== */
  .msg { display: flex; gap: 8px; align-items: flex-end; }
  .msg.bot { flex-direction: row; }
  .msg.user { flex-direction: row-reverse; }
  .bot-icon {
    width: 30px; height: 30px;
    background: #1a6b4a;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; font-weight: bold; flex-shrink: 0;
  }
  .bubble {
    max-width: 82%;
    padding: 10px 13px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.6;
    color: #1a1a1a;
  }
  .msg.bot .bubble {
    background: #f0f0f0;
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: #1a6b4a;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* ===== 選択肢ボタン ===== */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 4px 12px 4px 50px;
  }
  .choice-btn {
    background: #fff;
    border: 1.5px solid #1a6b4a;
    color: #1a6b4a;
    border-radius: 20px;
    padding: 10px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: background 0.15s;
  }
  .choice-btn:hover, .choice-btn:active { background: #e1f5ee; }
  .choice-btn:disabled { opacity: 0.4; cursor: default; background: #fff; }

  /* ===== 結果カード ===== */
  .result-card {
    background: #fff;
    border: 2px solid #1a6b4a;
    border-radius: 12px;
    overflow: hidden;
    margin: 2px 0;
  }
  .rc-header {
    background: #1a6b4a;
    color: #fff;
    padding: 10px 14px 12px;
  }
  .rc-num { font-size: 11px; opacity: 0.8; margin-bottom: 2px; }
  .rc-name { font-size: 15px; font-weight: bold; line-height: 1.3; }
  .rc-price { font-size: 22px; font-weight: bold; margin-top: 4px; }
  .rc-price span { font-size: 12px; font-weight: normal; opacity: 0.85; }
  .rc-body { padding: 12px 14px; }
  .rc-row { display: flex; gap: 8px; margin-bottom: 7px; align-items: flex-start; }
  .rc-label { font-size: 11px; color: #888; min-width: 52px; padding-top: 2px; flex-shrink: 0; }
  .rc-val { font-size: 12.5px; color: #222; line-height: 1.5; }
  .tag {
    display: inline-block;
    background: #e1f5ee;
    color: #0f6e56;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin: 2px 2px 2px 0;
  }
  .warn-tag {
    display: inline-block;
    background: #faeeda;
    color: #854f0b;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin: 2px 2px 2px 0;
  }

  /* ===== 仮予約ボタン ===== */
  .reserve-btn {
    display: block;
    width: 100%;
    background: #d85a30;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px 16px;
    font-size: 14px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    margin-top: 12px;
    transition: background 0.15s;
    text-decoration: none;
  }
  .reserve-btn:hover, .reserve-btn:active { background: #c04828; }
  .reserve-btn-sub {
    font-size: 11px;
    font-weight: normal;
    opacity: 0.9;
    display: block;
    margin-top: 2px;
  }

  /* ===== 補足ボックス ===== */
  .info-box {
    background: #e1f5ee;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #0f6e56;
    line-height: 1.55;
    margin-top: 4px;
  }
  .excluded-box {
    background: #faeeda;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    color: #854f0b;
    line-height: 1.55;
    margin-top: 4px;
  }

  /* ===== タイピングインジケーター ===== */
  .typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
  .dot { width: 7px; height: 7px; background: #aaa; border-radius: 50%; animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

  /* ===== リスタートボタン ===== */
  .restart-wrap { padding: 4px 12px 0; }
  .restart-btn {
    background: none;
    border: 1px solid #ccc;
    color: #888;
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 6px;
  }
  .restart-btn:hover { background: #f5f5f5; }

  /* ===== 複数結果 ===== */
  .multi-results { display: flex; flex-direction: column; gap: 10px; }

  /* ===== 仕切り ===== */
  .divider { border: none; border-top: 1px solid #e8e8e8; margin: 4px 0; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-icon">＋</div>
    <div>
      <div class="header-title">釧路孝仁会記念病院 高度健診センター</div>
      <div class="header-sub">ドック・健診コース診断</div>
    </div>
  </div>
  <div class="chat-area" id="chat"></div>
</div>

<script>
// =============================================
// ★ 設定：GoogleフォームのURLをここに入力 ★
// =============================================
const FORM_BASE_URL = 'https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform';
// フォームのフィールド名（Googleフォームの「事前入力リンク」から取得）
const FORM_PARAM_COURSE = 'entry.XXXXXXXXX';  // コース名フィールド
const FORM_PARAM_PRICE  = 'entry.YYYYYYYYY';  // 料金フィールド

// =============================================
// コースデータ
// =============================================
const COURSES = {
  c01: { num:'01', name:'三大プレミアムドック（8時間）', price:'249,700', time:'約8時間', mri:true, cta:true,
    summary:'PET-CT・脳ドック・心臓ドック＋脊髄・胃カメラ・肺機能・聴力を1日で。最も充実した内容。',
    tags:['PET-CT','頭部MRI/MRA','冠動脈CTA','胃カメラ','肺機能検査','腫瘍マーカー','頚椎/腰椎MRI','頚動脈エコー'] },
  c02: { num:'02', name:'三大クイックドック（8時間）', price:'213,400', time:'約8時間', mri:true, cta:true,
    summary:'PET-CT・脳ドック・心臓ドック＋胃カメラを1日で。三大疾病コースで最も人気。',
    tags:['PET-CT','頭部MRI/MRA','冠動脈CTA','胃カメラ','腫瘍マーカー','頚動脈エコー'] },
  c03: { num:'03', name:'三大疾病ドック（2日間）', price:'189,200', time:'2日間', mri:true, cta:true,
    summary:'PET-CT・脳ドック・心臓ドックを2日間でじっくり。24時間心電図も含む。',
    tags:['PET-CT','頭部MRI/MRA','冠動脈CTA','24時間心電図','腫瘍マーカー','頚動脈エコー'] },
  c04: { num:'04', name:'PET総合がんドック（約5時間）', price:'126,500', time:'約5時間', mri:true, cta:false,
    summary:'PET-CT・MRI・腫瘍マーカーを組み合わせたがん早期発見コース。',
    tags:['PET-CT','胸部CT','頭部/骨盤MRI','甲状腺エコー','腫瘍マーカー','ABC検診'] },
  c05: { num:'05', name:'PET-CTドック（約3時間）', price:'88,000', time:'約3時間', mri:false, cta:false,
    summary:'PET-CT単独の全身スクリーニング。短時間でがん検査を受けたい方に。',
    tags:['PET-CT','胸部CT'] },
  c06: { num:'06', name:'肺がんドック（約3時間）', price:'27,500', time:'約3時間', mri:false, cta:false,
    summary:'胸部CT・肺機能・喀痰・腫瘍マーカーで肺がんを早期発見。喫煙者に推奨。',
    tags:['胸部CT','肺機能検査','喀痰検査','腫瘍マーカー'] },
  c07: { num:'07', name:'肺がん検査（約30分）', price:'9,900', time:'約30分', mri:false, cta:false,
    summary:'問診＋胸部CTのみ。短時間でお手軽に。まずは肺だけチェックしたい方に。',
    tags:['胸部CT','問診'] },
  c08: { num:'08', name:'脳精密ドック（約3時間）', price:'33,000', time:'約3時間', mri:true, cta:false,
    summary:'頭部MRI/MRA・頚動脈エコー・ABI・眼底で脳血管病変・動脈瘤を精査。',
    tags:['頭部MRI/MRA','頚動脈エコー','ABI検査','眼底検査','心電図','血液検査'] },
  c09: { num:'09', name:'脳脊髄精密ドック（約4時間）', price:'55,000', time:'約4時間', mri:true, cta:false,
    summary:'脳精密ドック＋頚椎・腰椎MRIを追加。手足のしびれが気になる方に。',
    tags:['頭部/頚椎/腰椎MRI','頚椎/腰椎X線','頚動脈エコー','ABI検査','眼底検査'] },
  c10: { num:'10', name:'認知症ドック（約5時間）', price:'93,500', time:'約5時間', mri:true, cta:false,
    summary:'PET-CT＋頭部MRI（VSRAD）で認知症・アルツハイマーを早期発見。',
    tags:['PET-CT','頭部MRI（VSRAD）','頚動脈エコー','認知機能検査','血液検査'] },
  c11: { num:'11', name:'心臓ドック（2日間）', price:'66,000', time:'2日間', mri:false, cta:true,
    summary:'320列CTによる冠動脈CTA・心臓エコー・24時間心電図で心臓を精密検査。',
    tags:['冠動脈CTA','心臓エコー','24時間心電図','ABI検査','頚動脈エコー','胸部CT'] },
  c12: { num:'12', name:'血管ドック（約3時間）', price:'28,600', time:'約3時間', mri:false, cta:false,
    summary:'胸部/腹部CT・頚動脈エコー・ABIで動脈硬化・大動脈瘤・血管疾患を検査。',
    tags:['胸部/腹部CT','頚動脈エコー','ABI検査','眼底検査','血液検査'] },
  c13g: { num:'13', name:'人間ドック・胃カメラコース（約4時間）', price:'42,900', time:'約4時間', mri:false, cta:false,
    summary:'生活習慣病・胃がんの早期発見。内視鏡（胃カメラ）で精密検査。',
    tags:['胃カメラ','胸部X線','腹部エコー','眼底検査','肺機能検査','腫瘍マーカー','便潜血'] },
  c13b: { num:'13', name:'人間ドック・胃バリウムコース（約3時間）', price:'38,500', time:'約3時間', mri:false, cta:false,
    summary:'生活習慣病・胃がんの早期発見。バリウム検査コース。',
    tags:['胃バリウム','胸部X線','腹部エコー','眼底検査','肺機能検査','腫瘍マーカー','便潜血'] },
  c13a: { num:'13', name:'人間ドック・ABC検診コース（約2時間）', price:'35,200', time:'約2時間', mri:false, cta:false,
    summary:'生活習慣病スクリーニング。血液検査中心で短時間・低コスト。',
    tags:['ABC検診（血液）','胸部X線','腹部エコー','眼底検査','肺機能検査','腫瘍マーカー'] },
};

// =============================================
// ユーティリティ
// =============================================
let mriNG = false, ctaNG = false;
const chat = document.getElementById('chat');

function scrollBot() {
  setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

function addBot(html, delay=380) {
  return new Promise(resolve => {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.innerHTML = '<div class="bot-icon">＋</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
    chat.appendChild(wrap);
    scrollBot();
    setTimeout(() => {
      wrap.querySelector('.bubble').innerHTML = html;
      scrollBot();
      resolve();
    }, delay);
  });
}

function addUser(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.innerHTML = `<div class="bubble">${text}</div>`;
  chat.appendChild(wrap);
  scrollBot();
}

function addChoices(items) {
  const div = document.createElement('div');
  div.className = 'choices';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = item.label;
    btn.onclick = () => {
      div.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      item.action();
    };
    div.appendChild(btn);
  });
  chat.appendChild(div);
  scrollBot();
}

function makeReserveBtn(courseName, price) {
  const params = new URLSearchParams();
  params.set(FORM_PARAM_COURSE, courseName);
  params.set(FORM_PARAM_PRICE, price + '円（税込）');
  const url = FORM_BASE_URL + '?' + params.toString();
  return `<a class="reserve-btn" href="${url}" target="_blank">
    この内容で仮予約する →
    <span class="reserve-btn-sub">Googleフォームへ移動します</span>
  </a>`;
}

function cardHTML(id) {
  const c = COURSES[id];
  const mriWarn = c.mri
    ? `<div style="margin-top:8px"><span class="warn-tag">MRIを含む</span><span style="font-size:11px;color:#888;">体内金属のある方は事前にご連絡ください</span></div>`
    : '';
  const ctaWarn = c.cta
    ? `<div style="margin-top:4px"><span class="warn-tag">冠動脈CTAを含む</span><span style="font-size:11px;color:#888;">造影剤を使用します。アレルギーのある方は事前にご連絡ください</span></div>`
    : '';
  return `<div class="result-card">
    <div class="rc-header">
      <div class="rc-num">コース ${c.num}</div>
      <div class="rc-name">${c.name}</div>
      <div class="rc-price">${c.price}円<span>（税込）</span></div>
    </div>
    <div class="rc-body">
      <div class="rc-row"><span class="rc-label">所要時間</span><span class="rc-val">${c.time}</span></div>
      <div class="rc-row"><span class="rc-label">内容</span><span class="rc-val">${c.summary}</span></div>
      <div class="rc-row" style="margin-top:4px"><span class="rc-label">主な検査</span><span class="rc-val">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</span></div>
      ${mriWarn}${ctaWarn}
      ${makeReserveBtn(c.name, c.price)}
    </div>
  </div>`;
}

function multiCards(ids) {
  return `<div class="multi-results">${ids.map(cardHTML).join('')}</div>`;
}

function addRestart() {
  const div = document.createElement('div');
  div.className = 'restart-wrap';
  div.innerHTML = `<hr class="divider"><button class="restart-btn" onclick="start()">最初からやり直す</button>`;
  chat.appendChild(div);
  scrollBot();
}

// =============================================
// 診断フロー
// =============================================
async function start() {
  chat.innerHTML = '';
  mriNG = false; ctaNG = false;
  await addBot('こんにちは！<br>釧路孝仁会記念病院 高度健診センターの<strong>コース診断</strong>です。<br>いくつかのご質問で、最適なドック・健診コースをご提案します。', 600);
  await stepMRI();
}

async function stepMRI() {
  await addBot('まず安全確認のご質問です。<br>以下のいずれかに<strong>当てはまりますか？</strong><br><br>・心臓ペースメーカー<br>・人工弁・脳動脈瘤クリップ<br>・体内に金属（ボルト・人工関節等）<br>・入れ墨');
  addChoices([
    { label: 'はい、当てはまるものがある', action: async () => {
      addUser('はい、当てはまるものがある');
      mriNG = true;
      await addBot('承知しました。MRIを含む検査は受けられない場合があります。<br><span style="font-size:12px;color:#666;">（MRIを含まないコースをご案内します）</span>');
      await stepCTA();
    }},
    { label: 'いいえ、当てはまらない', action: async () => {
      addUser('いいえ、当てはまらない');
      await stepCTA();
    }}
  ]);
}

async function stepCTA() {
  await addBot('次のご確認です。以下はありますか？<br><br>・<strong>造影剤アレルギー</strong><br>・重度の<strong>腎機能低下</strong><br>・<strong>腎臓病・糖尿病・重篤な心臓病</strong>');
  addChoices([
    { label: 'はい、当てはまるものがある', action: async () => {
      addUser('はい、当てはまるものがある');
      ctaNG = true;
      await addBot('承知しました。冠動脈CTAを含むコースは除いてご案内します。<br><span style="font-size:12px;color:#666;">※受診前に必ず担当医師にご相談ください</span>');
      await stepRoute();
    }},
    { label: 'いいえ、当てはまらない', action: async () => {
      addUser('いいえ、当てはまらない');
      await stepRoute();
    }}
  ]);
}

async function stepRoute() {
  await addBot('今回、最も優先して確認したいのはどれですか？');
  addChoices([
    { label: 'A：全身のがん・三大疾病を網羅したい', action: async () => {
      addUser('A：全身のがん・三大疾病を網羅したい');
      await routeA();
    }},
    { label: 'B：特定の部位（脳・心臓・肺・物忘れ）が心配', action: async () => {
      addUser('B：特定の部位が心配');
      await routeB();
    }},
    { label: 'C：一般的な人間ドック・会社指定の健診', action: async () => {
      addUser('C：一般的な人間ドック・会社指定の健診');
      await routeC();
    }},
    { label: 'D：女性向け検診（乳がん・子宮がん）', action: async () => {
      addUser('D：女性向け検診（乳がん・子宮がん）');
      await routeD();
    }}
  ]);
}

// ルートA：全身・三大疾病
async function routeA() {
  await addBot('受診にかけられる時間はどのくらいですか？');
  addChoices([
    { label: '1日（8時間程度）で完結させたい', action: async () => {
      addUser('1日で完結させたい');
      await addBot('1日コースをご提案します。<br>内容の違いは<strong>脊髄検査・胃カメラ・肺機能・聴力の追加</strong>の有無です。');
      if (!mriNG && !ctaNG) {
        await addBot(multiCards(['c01','c02']));
        await addBot('<div class="info-box">PET-CTはがん細胞がブドウ糖を正常細胞の数〜数十倍多く取り込む性質を利用し、1回の検査で全身のがんをスクリーニングできる最先端の画像診断法です。</div>');
      } else if (mriNG) {
        await addBot('MRIが含まれるため三大疾病コースはご利用いただけません。PET-CT単独コースをご提案します。');
        await addBot(cardHTML('c05'));
      } else {
        await addBot('造影剤の制限により冠動脈CTAを除いたコースをご提案します。');
